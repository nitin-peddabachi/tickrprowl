<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200">
  <!-- Background -->
  <rect width="880" height="200" fill="#0C0C0E"/>

  <!-- Subtle background grid -->
  <g stroke="#00D97E" stroke-width="0.6" opacity="0.035">
    <line x1="0" y1="40"  x2="880" y2="40"/>
    <line x1="0" y1="80"  x2="880" y2="80"/>
    <line x1="0" y1="120" x2="880" y2="120"/>
    <line x1="0" y1="160" x2="880" y2="160"/>
    <line x1="110" y1="0" x2="110" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/>
    <line x1="330" y1="0" x2="330" y2="200"/>
    <line x1="440" y1="0" x2="440" y2="200"/>
    <line x1="550" y1="0" x2="550" y2="200"/>
    <line x1="660" y1="0" x2="660" y2="200"/>
    <line x1="770" y1="0" x2="770" y2="200"/>
  </g>

  <!-- Ghost claw marks — large, faint, right-side decoration -->
  <g opacity="0.04">
    <line x1="590" y1="190" x2="630" y2="30"  stroke="#00D97E" stroke-width="40" stroke-linecap="round"/>
    <line x1="690" y1="190" x2="730" y2="10"  stroke="#00D97E" stroke-width="40" stroke-linecap="round"/>
    <line x1="790" y1="190" x2="830" y2="-10" stroke="#00D97E" stroke-width="40" stroke-linecap="round"/>
  </g>

  <!-- Main claw icon — left side -->
  <!-- Scale the 180x150 viewBox to ~140px tall, centered in 200px height -->
  <!-- scale = 140/150 = 0.933, x offset = 48, y offset = (200-140)/2 = 30 -->
  <g transform="translate(48, 26) scale(0.88)">
    <line x1="28"  y1="132" x2="46"  y2="58"  stroke="#00D97E" stroke-width="17" stroke-linecap="round"/>
    <line x1="80"  y1="132" x2="98"  y2="34"  stroke="#00D97E" stroke-width="17" stroke-linecap="round"/>
    <line x1="132" y1="132" x2="150" y2="10"  stroke="#00D97E" stroke-width="17" stroke-linecap="round"/>
    <line x1="150" y1="10"  x2="176" y2="3"   stroke="#00FF94" stroke-width="8"  stroke-linecap="round"/>
  </g>

  <!-- Vertical separator -->
  <line x1="228" y1="44" x2="228" y2="156" stroke="#00D97E" stroke-width="1" opacity="0.18"/>

  <!-- Wordmark -->
  <text x="254" y="118"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="74" letter-spacing="1">
    <tspan fill="#FFFFFF">TICKR</tspan><tspan fill="#00D97E">·PROWL</tspan>
  </text>

  <!-- Tagline -->
  <text x="256" y="148"
        font-family="'Courier New', Courier, 'Lucida Console', monospace"
        font-size="12.5" letter-spacing="3.5"
        fill="#FFFFFF" opacity="0.3">
    HUNT THE MARKET  ·  FIND THE EDGE
  </text>
</svg>
