services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - stockr_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/stockr.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  stockr_data:
